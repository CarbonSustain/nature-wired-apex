<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Paper shadow -->
  <rect x="27" y="22" rx="6" ry="6" width="68" height="82" fill="#94a3b8" opacity="0.3"/>
  <!-- Paper body -->
  <rect x="24" y="18" rx="6" ry="6" width="68" height="82" fill="url(#paperGrad)" stroke="#bae6fd" stroke-width="1.5"/>
  <!-- Fold corner -->
  <path d="M 75 18 L 92 35 L 75 35 Z" fill="#7dd3fc" opacity="0.6"/>
  <path d="M 75 18 L 92 35 L 75 35 Z" fill="none" stroke="#bae6fd" stroke-width="1"/>
  <!-- Lines on paper -->
  <line x1="36" y1="50" x2="84" y2="50" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="62" x2="84" y2="62" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="74" x2="70" y2="74" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
  <!-- Big checkmark badge -->
  <circle cx="78" cy="85" r="18" fill="url(#checkGrad)" stroke="white" stroke-width="3"/>
  <path d="M 68 85 L 75 93 L 90 76" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title line -->
  <rect x="36" y="30" rx="3" ry="3" width="32" height="8" fill="#3b82f6" opacity="0.7"/>
  <!-- Stars -->
  <text x="14" y="18" font-size="12" fill="#60a5fa">★</text>
  <text x="98" y="105" font-size="10" fill="#34d399">★</text>
</svg>
