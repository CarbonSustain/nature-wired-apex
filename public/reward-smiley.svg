<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Glow ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#fde68a" stroke-width="6" opacity="0.6"/>
  <!-- Face background -->
  <circle cx="60" cy="60" r="48" fill="url(#faceGrad)"/>
  <defs>
    <radialGradient id="faceGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- Eyes -->
  <ellipse cx="44" cy="50" rx="5" ry="6" fill="#1e293b"/>
  <ellipse cx="76" cy="50" rx="5" ry="6" fill="#1e293b"/>
  <!-- Eye shine -->
  <circle cx="46" cy="47" r="2" fill="white"/>
  <circle cx="78" cy="47" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M 38 70 Q 60 90 82 70" stroke="#92400e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="35" cy="72" rx="9" ry="6" fill="#fca5a5" opacity="0.5"/>
  <ellipse cx="85" cy="72" rx="9" ry="6" fill="#fca5a5" opacity="0.5"/>
  <!-- Star sparkles -->
  <text x="6" y="22" font-size="14" fill="#fbbf24">✦</text>
  <text x="98" y="22" font-size="10" fill="#fbbf24">✦</text>
  <text x="10" y="105" font-size="8" fill="#fcd34d">✦</text>
</svg>
